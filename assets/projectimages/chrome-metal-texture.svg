<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08090c"/>
      <stop offset="0.18" stop-color="#bfc3c9"/>
      <stop offset="0.34" stop-color="#3c4048"/>
      <stop offset="0.52" stop-color="#eef1f5"/>
      <stop offset="0.68" stop-color="#2d3139"/>
      <stop offset="0.85" stop-color="#d6dbe1"/>
      <stop offset="1" stop-color="#121418"/>
    </linearGradient>
    <pattern id="scan" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <path d="M0 0H8" stroke="#ffffff" stroke-opacity="0.08"/>
      <path d="M0 4H8" stroke="#000000" stroke-opacity="0.2"/>
    </pattern>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="13"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.16"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#g)"/>
  <rect width="800" height="500" fill="url(#scan)"/>
  <rect width="800" height="500" filter="url(#grain)" opacity="0.24"/>
</svg>
